<style>
:root {
  --navy: #0b1e3d;
  --navy-mid: #122a52;
  --navy-light: #1a3a6e;
  --gold: #c9993a;
  --gold-light: #e8b84b;
  --gold-pale: #f5e6c0;
  --cream: #faf8f3;
  --text: #1a1a2e;
  --muted: #6b7280;
  --white: #ffffff;
  --danger: #c0392b;
  --success: #1a7a4a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* ── HERO ── */
.hero {
  position: relative;
  min-height: 100vh;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 80px 20px 60px;
}

/* Geometric background lines */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,153,58,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,153,58,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Radial glow */
.hero::after {
  content: '';
  position: absolute;
  top: -100px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(201,153,58,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 2;
  text-align: center;
}

.hero-badge {
  display: inline-block;
  background: rgba(201,153,58,0.15);
  border: 1px solid rgba(201,153,58,0.4);
  color: var(--gold-light);
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 6px 18px;
  border-radius: 30px;
  margin-bottom: 24px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  animation: fadeDown 0.8s ease forwards;
}

.hero-photo-ring {
  position: relative;
  width: 150px;
  height: 150px;
  margin: 0 auto 28px;
  animation: fadeDown 0.9s ease 0.1s both;
}

.hero-photo-ring::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid transparent;
  background: linear-gradient(135deg, var(--gold), transparent, var(--gold)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  animation: spin 8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.hero-photo {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  border: 3px solid rgba(201,153,58,0.3);
  background: var(--navy-light);
}

.hero-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.8rem, 7vw, 5rem);
  font-weight: 700;
  color: var(--white);
  line-height: 1.05;
  margin-bottom: 10px;
  animation: fadeDown 1s ease 0.2s both;
}

.hero-name span { color: var(--gold-light); }

.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  letter-spacing: 6px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
  animation: fadeDown 1s ease 0.3s both;
}

.hero-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 40px;
  animation: fadeDown 1s ease 0.4s both;
}

.pill {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.75);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.3s ease;
}

.pill:hover {
  background: rgba(201,153,58,0.2);
  border-color: var(--gold);
  color: var(--gold-light);
}

.hero-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  animation: fadeDown 1s ease 0.5s both;
}

.hero-nav a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all 0.3s ease;
  position: relative;
}

.hero-nav a::after {
  content: '';
  position: absolute;
  bottom: 4px; left: 50%; right: 50%;
  height: 1px;
  background: var(--gold);
  transition: all 0.3s ease;
}

.hero-nav a:hover {
  color: var(--gold-light);
}

.hero-nav a:hover::after {
  left: 16px; right: 16px;
}

/* Scroll indicator */
.scroll-hint {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: bounce 2s ease infinite;
  z-index: 2;
}

.scroll-hint::before {
  content: '';
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, rgba(201,153,58,0.6), transparent);
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ── SECTION BASE ── */
.section {
  padding: 90px 20px;
  max-width: 1100px;
  margin: 0 auto;
}

.section-tag {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 5px;
  color: var(--gold);
  margin-bottom: 10px;
  display: block;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 50px;
  line-height: 1.1;
}

.section-title em {
  color: var(--gold);
  font-style: normal;
}

/* ── DIVIDER ── */
.wave-divider {
  width: 100%;
  overflow: hidden;
  line-height: 0;
}

.wave-divider svg {
  display: block;
  width: 100%;
}

/* ── ABOUT ── */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 50px;
  align-items: start;
}

.about-text p {
  font-size: 16px;
  color: #444;
  line-height: 1.8;
  margin-bottom: 16px;
}

.info-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 24px;
}

.info-list li {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: 14px;
  color: #444;
}

.info-list .label {
  font-weight: 600;
  color: var(--navy);
  min-width: 80px;
  font-size: 13px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.info-list a {
  color: var(--gold);
  text-decoration: none;
  transition: color 0.2s;
}

.info-list a:hover { color: var(--navy); }

.stat-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.stat-card {
  background: var(--navy);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(11,30,61,0.2);
}

.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  color: var(--gold-light);
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
}

/* ── SKILLS ── */
.skills-bg {
  background: var(--navy);
  padding: 90px 20px;
}

.skills-bg .section-title { color: var(--white); }
.skills-bg .section-tag { color: var(--gold-light); }

.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  max-width: 1100px;
  margin: 0 auto;
}

.skill-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 20px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.3s ease;
  cursor: default;
}

.skill-item:hover {
  background: rgba(201,153,58,0.12);
  border-color: rgba(201,153,58,0.4);
  transform: translateX(4px);
}

.skill-icon {
  width: 36px;
  height: 36px;
  background: rgba(201,153,58,0.15);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.skill-name {
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
}

/* ── CERTIFICATIONS ── */
.certs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.cert-card {
  background: var(--white);
  border-radius: 16px;
  padding: 28px 24px;
  border: 1px solid rgba(11,30,61,0.08);
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.cert-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transform: scaleX(0);
  transition: transform 0.3s ease;
  transform-origin: left;
}

.cert-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 40px rgba(11,30,61,0.12);
}

.cert-card:hover::after { transform: scaleX(1); }

.cert-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  color: rgba(11,30,61,0.06);
  line-height: 1;
  margin-bottom: 8px;
}

.cert-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.4;
}

.cert-badge {
  display: inline-block;
  margin-top: 10px;
  background: rgba(201,153,58,0.1);
  border: 1px solid rgba(201,153,58,0.3);
  color: var(--gold);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}

/* ── SAFETY MATTERS ── */
.safety-section {
  background: linear-gradient(135deg, var(--navy) 0%, #0d2855 100%);
  padding: 90px 20px;
  position: relative;
  overflow: hidden;
}

.safety-section::before {
  content: '"';
  position: absolute;
  top: -20px; left: 5%;
  font-family: 'Cormorant Garamond', serif;
  font-size: 25rem;
  color: rgba(201,153,58,0.04);
  line-height: 1;
  pointer-events: none;
}

.safety-inner {
  max-width: 1100px;
  margin: 0 auto;
}

.safety-section .section-title { color: var(--white); }
.safety-section .section-tag { color: var(--gold-light); }

.quote-block {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  font-style: italic;
  color: var(--gold-light);
  border-left: 3px solid var(--gold);
  padding-left: 24px;
  margin-bottom: 50px;
  line-height: 1.6;
}

.safety-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.safety-text {
  font-size: 16px;
  color: rgba(255,255,255,0.7);
  line-height: 1.8;
}

.safety-text strong { color: var(--white); }

.safety-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.safety-list li {
  display: flex;
  align-items: center;
  gap: 12px;
  color: rgba(255,255,255,0.75);
  font-size: 15px;
}

.safety-list li::before {
  content: '✦';
  color: var(--gold);
  font-size: 12px;
  flex-shrink: 0;
}

.safety-cta {
  margin-top: 40px;
  text-align: center;
}

/* ── EXPERIENCE ── */
.exp-card {
  background: var(--white);
  border-radius: 16px;
  padding: 36px;
  border: 1px solid rgba(11,30,61,0.08);
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  display: flex;
  gap: 28px;
  align-items: flex-start;
  transition: all 0.3s ease;
}

.exp-card:hover {
  box-shadow: 0 16px 40px rgba(11,30,61,0.1);
  transform: translateY(-3px);
}

.exp-logo {
  width: 60px;
  height: 60px;
  background: var(--navy);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--gold);
  letter-spacing: 1px;
  flex-shrink: 0;
}

.exp-details h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 6px;
}

.exp-details .exp-sub {
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.exp-details p {
  font-size: 15px;
  color: #555;
  line-height: 1.7;
}

/* ── SOCIAL ── */
.social-section { padding: 70px 20px; max-width: 1100px; margin: 0 auto; }

.social-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

.social-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 18px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.3s ease;
  border: 1px solid transparent;
}

.social-card.fb  { background: #e8f0fe; color: #1877f2; border-color: #c3d3fa; }
.social-card.tw  { background: #e8f5fe; color: #1da1f2; border-color: #bee3fd; }
.social-card.ig  { background: #fce8f3; color: #e1306c; border-color: #f7bad9; }
.social-card.tg  { background: #e8f5fd; color: #0088cc; border-color: #b3d9ef; }
.social-card.li  { background: #e8f2fa; color: #0077b5; border-color: #b3d3e8; }

.social-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

.social-icon { font-size: 20px; }

/* ── CONTACT ── */
.contact-section { background: var(--navy); padding: 90px 20px; }

.contact-inner { max-width: 680px; margin: 0 auto; }

.contact-section .section-title { color: var(--white); }
.contact-section .section-tag { color: var(--gold-light); }

.contact-form {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 40px;
}

.form-group { margin-bottom: 20px; }

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 8px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  transition: all 0.3s ease;
  outline: none;
}

.form-group input::placeholder,
.form-group textarea::placeholder { color: rgba(255,255,255,0.3); }

.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--gold);
  background: rgba(201,153,58,0.06);
  box-shadow: 0 0 0 3px rgba(201,153,58,0.1);
}

.form-group textarea { resize: vertical; min-height: 130px; }

/* ── BUTTONS ── */
.btn-gold {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--navy);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(201,153,58,0.3);
}

.btn-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(201,153,58,0.4);
}

.btn-outline {
  display: inline-block;
  background: transparent;
  color: var(--gold-light);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 12px 26px;
  border-radius: 8px;
  border: 1px solid rgba(201,153,58,0.5);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s ease;
}

.btn-outline:hover {
  background: rgba(201,153,58,0.1);
  border-color: var(--gold-light);
}

/* ── FOOTER ── */
footer {
  background: #060f1e;
  text-align: center;
  padding: 30px 20px;
  color: rgba(255,255,255,0.3);
  font-size: 13px;
}

footer span { color: var(--gold); }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  display: none;
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 999;
  width: 44px;
  height: 44px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 50%;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(201,153,58,0.4);
  transition: all 0.3s ease;
}

#scrollTopBtn:hover {
  background: var(--gold-light);
  transform: translateY(-3px);
}

/* ── TOAST ── */
#toast {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 28px;
  background: var(--success);
  color: var(--white);
  padding: 12px 22px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  z-index: 9999;
  animation: fadeDown 0.4s ease;
}

/* ── SCROLL REVEAL ── */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── ANIMATIONS ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
